name: Promote Develop to Main

on:
  push:
    branches:
      - develop

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Fetch all branches
        run: |
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - name: Prepare main branch
        run: |
          # If origin/main exists, create/update local main to match it.
          if git ls-remote --exit-code --heads origin main; then
            git checkout -B main origin/main
          else
            # If main doesn't exist yet, create it from develop and push.
            git checkout -B main origin/develop
            git push -u origin main
            echo "Created main from develop and pushed to origin."
            exit 0
          fi

      - name: Merge develop into main
        run: |
          git merge --no-ff --no-edit origin/develop

      - name: Push main
        run: |
          git push origin main